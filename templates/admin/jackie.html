{% extends "base_admin.html" %}

{% block page_title %}Jackie AI{% endblock %}
{% block page_subtitle %}{% endblock %}

{% block content %}
<style>
    /* -- Orb ------------------------------------------------------------ */
    .jackie-orb {
        width: 120px; height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #e4c76a, #c8a960, #8b6914);
        box-shadow: 0 0 60px rgba(200, 169, 96, 0.4), 0 0 120px rgba(200, 169, 96, 0.2);
        animation: orbPulse 3s ease-in-out infinite;
        margin: 0 auto;
        cursor: pointer;
    }
    .jackie-orb.loading {
        animation: orbPulseFast 1s ease-in-out infinite;
    }
    /* Live voice: listening (steady strong glow) vs speaking (fast pulse) */
    .jackie-orb.voice-listening {
        animation: orbPulse 2s ease-in-out infinite;
        box-shadow: 0 0 70px rgba(120, 200, 140, 0.55), 0 0 130px rgba(120, 200, 140, 0.25);
        background: radial-gradient(circle at 35% 35%, #8fe0a8, #4fae74, #1f7a4a);
    }
    .jackie-orb.voice-speaking {
        animation: orbPulseFast 0.7s ease-in-out infinite;
        box-shadow: 0 0 90px rgba(228, 199, 106, 0.8), 0 0 150px rgba(228, 199, 106, 0.35);
    }
    @keyframes orbPulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(200, 169, 96, 0.4); }
        50%      { transform: scale(1.05); box-shadow: 0 0 80px rgba(200, 169, 96, 0.6); }
    }
    @keyframes orbPulseFast {
        0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(200, 169, 96, 0.5); }
        50%      { transform: scale(1.08); box-shadow: 0 0 100px rgba(200, 169, 96, 0.8); }
    }

    /* -- Orb section ---------------------------------------------------- */
    .jackie-orb-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 16px 20px;
        gap: 14px;
        flex-shrink: 0;
    }
    .jackie-orb-label {
        font-size: 0.8rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--gold);
        opacity: 0.7;
    }
    .jackie-controls {
        display: flex;
        gap: 10px;
        margin-top: 4px;
    }
    .jackie-controls button {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-subtle);
        padding: 5px 14px;
        border-radius: 6px;
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 0.06em;
    }
    .jackie-controls button:hover {
        border-color: var(--border-gold);
        color: var(--text-muted);
    }

    /* -- Conversation area ---------------------------------------------- */
    .jackie-conversation-label {
        font-size: 0.65rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-subtle);
        padding: 10px 24px 6px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
    }
    .jackie-messages {
        flex: 1;
        overflow-y: auto;
        padding: 8px 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    /* -- Message bubbles ------------------------------------------------ */
    .jackie-msg {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        max-width: 80%;
    }
    .jackie-msg.ai  { align-self: flex-start; }
    .jackie-msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .jackie-avatar {
        width: 28px; height: 28px;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        flex-shrink: 0;
        margin-top: 2px;
    }
    .jackie-avatar.ai-avatar {
        background: var(--gold);
        color: #1a1a1a;
    }
    .jackie-avatar.user-avatar {
        background: rgba(199,163,90,0.2);
        color: var(--gold);
        border: 1px solid rgba(199,163,90,0.3);
    }

    .jackie-bubble {
        padding: 10px 16px;
        border-radius: 14px;
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--text-primary);
    }
    .jackie-msg.ai .jackie-bubble {
        background: var(--bg-card);
        border: 1px solid var(--border-light);
        border-radius: 14px 14px 14px 4px;
    }
    .jackie-msg.user .jackie-bubble {
        background: rgba(199,163,90,0.15);
        border: 1px solid rgba(199,163,90,0.25);
        border-radius: 14px 14px 4px 14px;
    }
    .jackie-bubble .timestamp {
        font-size: 0.6rem;
        color: var(--text-subtle);
        margin-top: 4px;
    }

    /* -- Typing dots ---------------------------------------------------- */
    .jackie-typing-dots {
        display: flex; gap: 5px; align-items: center;
    }
    .jackie-typing-dots span {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--gold);
        animation: typingBounce 1.4s infinite both;
    }
    .jackie-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .jackie-typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* -- Input bar ------------------------------------------------------ */
    .jackie-input-bar {
        padding: 14px 24px;
        border-top: 1px solid var(--border);
        background: var(--bg-card);
        flex-shrink: 0;
    }
    .jackie-input-bar form {
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .jackie-input-bar input {
        flex: 1;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 16px;
        color: var(--text-primary);
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
    }
    .jackie-input-bar input:focus {
        border-color: var(--border-gold);
    }
    .jackie-input-bar button[type="submit"] {
        background: var(--gold);
        border: none;
        border-radius: 10px;
        width: 42px; height: 42px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: opacity 0.2s;
        flex-shrink: 0;
    }
    .jackie-input-bar button[type="submit"]:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }
</style>

<div x-data="jackieChat()" x-init="init()" style="
    display: flex;
    flex-direction: column;
    height: calc(100vh - 140px);
    max-width: 900px;
    margin: 0 auto;
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
">
    <!-- ORB SECTION (~30%) -->
    <div class="jackie-orb-section">
        <div class="jackie-orb"
             :class="{ 'loading': loading || voiceState === 'connecting', 'voice-listening': voiceState === 'listening', 'voice-speaking': voiceState === 'speaking' }"
             @click="toggleVoice()"
             title="Click to talk to Jackie"></div>
        <span class="jackie-orb-label" x-text="orbLabel()"></span>
        <div class="jackie-controls">
            <button type="button"
                    @click="toggleMute()"
                    :disabled="voiceState === 'off'"
                    :style="voiceState === 'off' ? 'opacity:0.4; cursor:default;' : ''"
                    x-text="muted ? 'Unmute' : 'Mute'"></button>
            <button type="button"
                    @click="stopVoice()"
                    :disabled="voiceState === 'off'"
                    :style="voiceState === 'off' ? 'opacity:0.4; cursor:default;' : ''">End Session</button>
            <button type="button" @click="clearHistory()">Clear</button>
        </div>
    </div>

    <!-- CONVERSATION label -->
    <div class="jackie-conversation-label">Conversation</div>

    <!-- MESSAGES -->
    <div class="jackie-messages" x-ref="messageArea">
        <!-- Welcome state when empty -->
        <template x-if="messages.length === 0">
            <div style="
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                text-align: center;
                gap: 10px;
                opacity: 0.6;
                padding: 24px 0;
            ">
                <p style="color: var(--text-muted); font-size: 1rem; margin: 0;">Hey! I'm Jackie, your AI business assistant.</p>
                <p style="color: var(--text-subtle); font-size: 0.85rem; margin: 0;">Ask me about marketing, operations, customers, or growth strategy.</p>
            </div>
        </template>

        <!-- Message bubbles -->
        <template x-for="(msg, i) in messages" :key="i">
            <div class="jackie-msg" :class="msg.role === 'user' ? 'user' : 'ai'">
                <!-- Avatar -->
                <div class="jackie-avatar" :class="msg.role === 'user' ? 'user-avatar' : 'ai-avatar'"
                     x-text="msg.role === 'user' ? 'ME' : 'AI'"></div>
                <!-- Bubble -->
                <div class="jackie-bubble">
                    <div x-html="chatFormatMessage(msg.content)"></div>
                    <div class="timestamp" x-text="chatFormatTime(msg.timestamp)"></div>
                </div>
            </div>
        </template>

        <!-- Typing indicator -->
        <div x-show="loading" class="jackie-msg ai">
            <div class="jackie-avatar ai-avatar">AI</div>
            <div class="jackie-bubble" style="background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 14px 14px 14px 4px;">
                <div class="jackie-typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>

    <!-- INPUT BAR -->
    <div class="jackie-input-bar">
        <form @submit.prevent="send()">
            <input type="text"
                   x-model="input"
                   placeholder="Ask Jackie anything about your business..."
                   autocomplete="off"
                   :disabled="loading">
            <button type="submit" :disabled="loading || !input.trim()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--bg-primary)" stroke-width="2.5">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </form>
    </div>
</div>

<script>
function jackieChat() {
    return {
        messages: [],
        input: '',
        loading: false,
        status: 'connected',

        // -- Voice state --
        voiceState: 'off',   // off | connecting | listening | speaking
        muted: false,

        init() {
            const saved = localStorage.getItem('jackie-chat-history');
            if (saved) {
                try { this.messages = JSON.parse(saved); } catch(e) { this.messages = []; }
            }
            // Tidy up the mic/socket if the user navigates away.
            window.addEventListener('beforeunload', () => this._teardown());
        },

        saveHistory() {
            localStorage.setItem('jackie-chat-history', JSON.stringify(this.messages.slice(-50)));
        },

        scrollBottom() {
            this.$nextTick(() => {
                const area = this.$refs.messageArea;
                if (area) area.scrollTop = area.scrollHeight;
            });
        },

        clearHistory() {
            this.stopVoice();
            this.messages = [];
            localStorage.removeItem('jackie-chat-history');
            this.status = 'connected';
        },

        orbLabel() {
            if (this.voiceState === 'connecting') return 'connecting...';
            if (this.voiceState === 'listening') return this.muted ? 'mic muted' : 'listening — talk to me';
            if (this.voiceState === 'speaking') return 'Jackie is speaking...';
            if (this.loading) return 'thinking...';
            return 'click the orb to talk';
        },

        // ── Live voice (OpenAI Realtime API) ──────────────────────────
        toggleVoice() {
            if (this.voiceState === 'off') this.startVoice();
            else this.stopVoice();
        },

        async startVoice() {
            if (this.voiceState !== 'off') return;
            this.voiceState = 'connecting';
            this._wantActive = true;
            this._lastActivity = Date.now();
            this._assistantIdx = -1;
            this._audioQueue = [];
            this._playHead = 0;

            let token, model;
            try {
                const res = await fetch('/jackie/api/realtime/session', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) {
                    this.voiceState = 'off';
                    this._wantActive = false;
                    this.messages.push({
                        role: 'assistant',
                        content: data.error || 'Voice is unavailable right now. You can still chat by typing.',
                        timestamp: new Date().toISOString()
                    });
                    this.saveHistory();
                    this.scrollBottom();
                    return;
                }
                token = data.client_secret;
                model = data.model || 'gpt-realtime';
            } catch (e) {
                this.voiceState = 'off';
                this._wantActive = false;
                this.messages.push({
                    role: 'assistant',
                    content: 'Could not reach the voice service. Type to me instead and check your connection.',
                    timestamp: new Date().toISOString()
                });
                this.scrollBottom();
                return;
            }

            // GA Realtime in the browser uses WebRTC, not WebSocket. We add the
            // mic as a track, receive Jackie's voice on a remote track, and
            // exchange SDP with OpenAI's /realtime/calls endpoint using the
            // ephemeral key. WebRTC handles all the audio encoding/playback.
            let mic;
            try {
                mic = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch (micErr) {
                this.voiceState = 'off';
                this._wantActive = false;
                this.messages.push({
                    role: 'assistant',
                    content: 'I could not access your microphone. Allow mic permission (and use https:// or http://localhost), then click the orb again.',
                    timestamp: new Date().toISOString()
                });
                this.scrollBottom();
                return;
            }
            this._mic = mic;

            try {
                const pc = new RTCPeerConnection();
                this._pc = pc;

                // Play Jackie's voice (arrives on a remote media track).
                const audioEl = new Audio();
                audioEl.autoplay = true;
                this._audioEl = audioEl;
                pc.ontrack = (ev) => { audioEl.srcObject = ev.streams[0]; };

                // Send the mic (respect the current mute state).
                mic.getAudioTracks().forEach(t => { t.enabled = !this.muted; pc.addTrack(t, mic); });

                // Data channel carries realtime events (transcripts, VAD, errors).
                const dc = pc.createDataChannel('oai-events');
                this._dc = dc;
                dc.onopen = () => { this.voiceState = 'listening'; this._startIdleTimer(); };
                dc.onmessage = (ev) => {
                    let msg; try { msg = JSON.parse(ev.data); } catch { return; }
                    this._handleRealtime(msg);
                };

                pc.onconnectionstatechange = () => {
                    if (['failed', 'disconnected', 'closed'].includes(pc.connectionState)) {
                        const wasActive = this._wantActive;
                        this._teardown();
                        if (wasActive && !this._reconnected) {
                            this._reconnected = true;
                            setTimeout(() => { if (this._wantActive !== false) this.startVoice(); }, 800);
                        }
                    }
                };

                // Offer → OpenAI → answer.
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                const sdpRes = await fetch(
                    'https://api.openai.com/v1/realtime/calls?model=' + encodeURIComponent(model),
                    {
                        method: 'POST',
                        body: offer.sdp,
                        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/sdp' }
                    }
                );
                if (!sdpRes.ok) {
                    this.messages.push({
                        role: 'assistant',
                        content: 'Could not start the voice session — the realtime service rejected it. Make sure your OpenAI key has Realtime API access. You can still chat by typing.',
                        timestamp: new Date().toISOString()
                    });
                    this.scrollBottom();
                    this._teardown();
                    return;
                }
                const answerSdp = await sdpRes.text();
                await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
                // voiceState flips to 'listening' when the data channel opens.
            } catch (e) {
                this.voiceState = 'off';
                this._teardown();
            }
        },

        stopVoice() {
            this._wantActive = false;
            this._reconnected = false;
            this._teardown();
        },

        toggleMute() {
            if (this.voiceState === 'off') return;
            this.muted = !this.muted;
            if (this._mic) this._mic.getAudioTracks().forEach(t => { t.enabled = !this.muted; });
        },

        _teardown() {
            if (this._idle) { clearInterval(this._idle); this._idle = null; }
            try { if (this._dc) { this._dc.onmessage = null; this._dc.close(); this._dc = null; } } catch (e) {}
            try { if (this._mic) { this._mic.getTracks().forEach(t => t.stop()); this._mic = null; } } catch (e) {}
            try { if (this._audioEl) { this._audioEl.srcObject = null; this._audioEl = null; } } catch (e) {}
            try {
                if (this._pc) {
                    this._pc.onconnectionstatechange = null;
                    this._pc.ontrack = null;
                    this._pc.close();
                    this._pc = null;
                }
            } catch (e) {}
            if (this.voiceState !== 'off') this.voiceState = 'off';
        },

        _handleRealtime(msg) {
            this._lastActivity = Date.now();
            switch (msg.type) {
                case 'input_audio_buffer.speech_started':
                    if (this.voiceState === 'speaking') this.voiceState = 'listening';
                    break;
                case 'conversation.item.input_audio_transcription.completed':
                    if (msg.transcript && msg.transcript.trim()) {
                        this.messages.push({ role: 'user', content: msg.transcript.trim(), timestamp: new Date().toISOString() });
                        this.saveHistory();
                        this.scrollBottom();
                    }
                    break;
                // GA renamed these (output_*). Keep the old names too so a
                // Beta-era model would still work.
                case 'response.output_audio_transcript.delta':
                case 'response.audio_transcript.delta':
                    this.voiceState = 'speaking';
                    if (this._assistantIdx < 0) {
                        this.messages.push({ role: 'assistant', content: msg.delta || '', timestamp: new Date().toISOString() });
                        this._assistantIdx = this.messages.length - 1;
                    } else {
                        const m = this.messages[this._assistantIdx];
                        this.messages.splice(this._assistantIdx, 1, { ...m, content: (m.content || '') + (msg.delta || '') });
                    }
                    this.scrollBottom();
                    break;
                case 'response.output_audio.delta':
                case 'response.audio.delta':
                    this.voiceState = 'speaking';
                    this._enqueueAudio(msg.delta);
                    break;
                case 'response.done':
                case 'response.output_audio.done':
                case 'response.audio.done':
                    this._assistantIdx = -1;
                    this.saveHistory();
                    if (this.voiceState === 'speaking') {
                        setTimeout(() => { if (this.voiceState === 'speaking') this.voiceState = 'listening'; }, 400);
                    }
                    break;
                case 'error':
                    console.error('Realtime error:', msg.error);
                    break;
            }
        },

        _enqueueAudio(b64) {
            if (!b64) return;
            if (!this._playCtx) {
                this._playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                this._playHead = 0;
            }
            const ctx = this._playCtx;
            const raw = atob(b64);
            const bytes = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
            const view = new DataView(bytes.buffer);
            const n = Math.floor(bytes.length / 2);
            const buf = ctx.createBuffer(1, n, 24000);
            const ch = buf.getChannelData(0);
            for (let i = 0; i < n; i++) ch[i] = view.getInt16(i * 2, true) / 32768;
            const src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            // Schedule back-to-back for gapless playback.
            const startAt = Math.max(ctx.currentTime + 0.02, this._playHead);
            src.start(startAt);
            this._playHead = startAt + buf.duration;
        },

        _startIdleTimer() {
            if (this._idle) clearInterval(this._idle);
            const IDLE_MS = 120000; // 2 min of silence → hang up to save credits
            this._idle = setInterval(() => {
                if (this.voiceState !== 'off' && Date.now() - (this._lastActivity || 0) > IDLE_MS) {
                    this.stopVoice();
                }
            }, 10000);
        },

        async send() {
            const message = this.input.trim();
            if (!message || this.loading) return;

            this.messages.push({
                role: 'user',
                content: message,
                timestamp: new Date().toISOString()
            });
            this.input = '';
            this.loading = true;
            this.saveHistory();
            this.scrollBottom();

            try {
                const history = this.messages.slice(-11, -1).map(m => ({
                    role: m.role,
                    content: m.content
                }));

                const resp = await fetch('/jackie/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, history })
                });

                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();

                this.status = data.provider || 'connected';

                this.messages.push({
                    role: 'assistant',
                    content: data.response || "I couldn't process that.",
                    timestamp: new Date().toISOString()
                });
            } catch (err) {
                this.messages.push({
                    role: 'assistant',
                    content: 'Sorry, I hit an error. Please check your API key in Settings and try again.',
                    timestamp: new Date().toISOString()
                });
            }

            this.loading = false;
            this.saveHistory();
            this.scrollBottom();
        }
    };
}
</script>
{% endblock %}
